<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Composition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    background-color: #E8E0D2;
    background-image:
      repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.018) 3px,
        rgba(0, 0, 0, 0.018) 3.5px
      );
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }

  /* tokonoma alcove recess — subtle lighter zone behind canvas */
  body::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 62%;
    height: 72%;
    background: radial-gradient(
      ellipse at center,
      rgba(255, 255, 255, 0.045) 0%,
      rgba(255, 255, 255, 0.02) 50%,
      transparent 100%
    );
    pointer-events: none;
    z-index: 0;
  }

  /* canvas */
  #canvas {
    display: block;
    position: relative;
    z-index: 1;
  }

  /* shelf shadow beneath canvas */
  body::after {
    content: '';
    position: fixed;
    top: calc(50% + min(27.5vh, 27.5vw) + 8px);
    left: 50%;
    transform: translateX(-50%);
    width: 30%;
    height: 0;
    border-bottom: 0.5px solid rgba(0, 0, 0, 0.08);
    z-index: 1;
    pointer-events: none;
  }

  /* overlay */
  #overlay {
    position: fixed;
    bottom: 64px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  #title-link {
    display: inline-block;
    text-decoration: none;
    color: inherit;
    pointer-events: auto;
    padding: 8px 16px;
    background: transparent;
    border: none;
    transition: opacity 0.3s ease;
  }

  #title-link:hover {
    opacity: 0.6;
  }

  #title {
    font-family: 'Cormorant', serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: #3A352E;
    line-height: 1.5;
  }

  #subtitle {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: #9A9488;
    line-height: 1.5;
    margin-top: 2px;
  }

  /* controls */
  #controls {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 40px;
    z-index: 20;
  }

  #controls button {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.08em;
    padding: 4px 0;
    background: transparent;
    color: #9A9488;
    border: none;
    cursor: pointer;
    transition: color 0.3s ease;
    -webkit-appearance: none;
    appearance: none;
    position: relative;
  }

  #controls button::before {
    content: '';
    display: inline-block;
    width: 0;
    overflow: hidden;
    font-size: 5px;
    vertical-align: middle;
    margin-right: 0;
    transition: width 0.3s ease, margin-right 0.3s ease;
  }

  #controls button.active {
    color: #3A352E;
  }

  #controls button.active::before {
    content: '\25CF';
    width: 5px;
    margin-right: 6px;
  }

  #controls button:hover:not(.active) {
    color: #6A6054;
  }

  /* timeline — vertical left edge */
  #timeline {
    position: fixed;
    left: 20px;
    top: 50%;
    z-index: 15;
    /* rotate the horizontal track to become vertical */
    /* width becomes the visual height after rotation */
    width: 60vh;
    height: 30px;
    transform: translateY(-50%) rotate(-90deg);
    transform-origin: center center;
    transition: opacity 0.4s ease;
  }

  #timeline.hidden {
    display: none;
  }

  #timeline-track {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
  }

  #timeline-line {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 0;
    border-top: 0.5px solid rgba(0, 0, 0, 0.1);
    transform: translateY(-50%);
  }

  /* timeline dots */
  .timeline-dot {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #B8AFA3;
    border-radius: 50%;
    cursor: pointer;
    transform: translate(-50%, -50%);
    top: 50%;
    transition: all 0.25s ease;
  }

  .timeline-dot:hover {
    width: 6px;
    height: 6px;
    background: #8A8278;
  }

  .timeline-dot.active {
    width: 6px;
    height: 6px;
    background: #6A6054;
  }

  /* year labels — counter-rotate to stay horizontal */
  .timeline-year {
    position: absolute;
    top: calc(50% + 12px);
    transform: translateX(-50%) rotate(90deg);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 9px;
    font-weight: 300;
    color: #9A9488;
    letter-spacing: 0.02em;
    white-space: nowrap;
    pointer-events: none;
  }

  /* tooltip — counter-rotate, appears to the right of dot (which is below in rotated space) */
  .timeline-tooltip {
    position: absolute;
    bottom: calc(50% + 12px);
    transform: translateX(-50%) rotate(90deg);
    transform-origin: center center;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 10px;
    font-weight: 300;
    color: #6A6054;
    background: transparent;
    border: none;
    padding: 0;
    white-space: nowrap;
    pointer-events: none;
  }

  /* responsive */
  @media (max-width: 600px) {
    #overlay {
      bottom: 56px;
    }

    #title {
      font-size: 13px;
    }

    #subtitle {
      font-size: 10px;
    }

    #controls {
      gap: 28px;
    }

    #controls button {
      font-size: 10px;
    }

    #timeline {
      left: 10px;
      width: 50vh;
    }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="overlay">
  <a id="title-link" href="#" target="_blank" rel="noopener">
    <h1 id="title"></h1>
    <p id="subtitle"></p>
  </a>
</div>

<div id="timeline" class="hidden">
  <div id="timeline-track">
    <div id="timeline-line"></div>
  </div>
</div>

<nav id="controls">
  <button data-mode="generate" class="active">Generate</button>
  <button data-mode="library">Library</button>
</nav>

<script type="module" src="js/main.js"></script>
</body>
</html>
