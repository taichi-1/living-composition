<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Composition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;1,400&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,
  *::before,
  *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Work Sans', sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #E9E3D8;
    background-image:
      repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.018) 0px,
        transparent 1px,
        transparent 3px
      ),
      repeating-linear-gradient(
        90deg,
        rgba(0, 0, 0, 0.014) 0px,
        transparent 1px,
        transparent 3px
      ),
      repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 7px,
        rgba(0, 0, 0, 0.006) 7px,
        rgba(0, 0, 0, 0.006) 8px
      ),
      repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 11px,
        rgba(0, 0, 0, 0.005) 11px,
        rgba(0, 0, 0, 0.005) 12px
      );
  }

  /* Subtle warmth variation across the wall */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(245, 235, 220, 0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 60%, rgba(220, 210, 195, 0.2) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Canvas — the painting on the wall */
  #canvas {
    display: block;
    position: relative;
    z-index: 1;
    box-shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
  }

  /* Mat board effect — pseudo-element on body, positioned behind canvas */
  body::after {
    content: '';
    position: absolute;
    z-index: 0;
    /* Sized and positioned by being centered like the canvas, but slightly larger.
       We use the same flex centering as the canvas. The canvas size is dynamic,
       so we layer this as a subtle background area. */
    width: calc(100% - 40px);
    height: calc(100% - 40px);
    max-width: 640px;
    max-height: 640px;
    background: #F0EBE2;
    border-radius: 1px;
    pointer-events: none;
    /* Match canvas centering */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    /* Slightly larger than the canvas — the padding effect */
    padding: 20px;
    box-shadow: 0 1px 8px rgba(0, 0, 0, 0.03);
  }

  /* Overlay (title area) */
  #overlay {
    position: fixed;
    bottom: 72px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
    transition: opacity 0.6s ease;
  }

  #title-link {
    text-decoration: none;
    display: inline-block;
  }

  #title-link:hover #title {
    color: #2A2520;
  }

  #title {
    font-family: 'Spectral', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 18px;
    color: #3E3830;
    letter-spacing: 0.01em;
    margin-bottom: 3px;
    transition: color 0.3s ease;
  }

  #subtitle {
    font-family: 'Work Sans', sans-serif;
    font-weight: 300;
    font-size: 12px;
    color: #9E9588;
    letter-spacing: 0.02em;
  }

  /* Controls — minimal, bottom-right */
  #controls {
    position: fixed;
    bottom: 24px;
    right: 28px;
    z-index: 10;
    display: flex;
    gap: 20px;
    opacity: 0.25;
    transition: opacity 0.4s ease;
  }

  #controls:hover {
    opacity: 0.7;
  }

  #controls button {
    font-family: 'Work Sans', sans-serif;
    font-weight: 400;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #3E3830;
    background: transparent;
    border: none;
    padding: 4px 0;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  #controls button:hover {
    color: #1A1610;
  }

  #controls button.active {
    font-weight: 500;
    color: #1A1610;
  }

  #controls button.active::before {
    content: '\2014\00a0';
  }

  /* Timeline — elegant gallery rail */
  #timeline {
    position: fixed;
    bottom: 48px;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 0 40px;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  #timeline.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(6px);
  }

  #timeline-track {
    position: relative;
    width: 100%;
    height: 36px;
    display: flex;
    align-items: flex-end;
  }

  /* Hide the line completely */
  #timeline-line {
    opacity: 0;
  }

  /* Timeline ticks — vertical dashes, not circles */
  .timeline-dot {
    position: absolute;
    bottom: 0;
    width: 1px;
    height: 8px;
    border-radius: 0;
    background: #C5BDB1;
    border: none;
    cursor: pointer;
    transform: translateX(-50%);
    top: auto;
    transition: all 0.3s ease;
    z-index: 2;
  }

  .timeline-dot:hover {
    background: #8A8174;
    height: 10px;
    box-shadow: none;
    transform: translateX(-50%);
  }

  .timeline-dot.active {
    background: #6A6054;
    height: 12px;
    box-shadow: none;
    transform: translateX(-50%);
  }

  /* Year labels — above ticks */
  .timeline-year {
    position: absolute;
    bottom: 16px;
    top: auto;
    transform: translateX(-50%);
    font-family: 'Work Sans', sans-serif;
    font-weight: 300;
    font-size: 9px;
    color: #B0A899;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  /* Tooltip — minimal warm card */
  .timeline-tooltip {
    position: absolute;
    bottom: 32px;
    transform: translateX(-50%);
    padding: 6px 12px;
    border-radius: 3px;
    background: #F5F0E8;
    border: 1px solid #E0D9CE;
    backdrop-filter: none;
    font-family: 'Work Sans', sans-serif;
    font-weight: 300;
    font-size: 11px;
    color: #3E3830;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: 3;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  }

  .timeline-dot:hover .timeline-tooltip,
  .timeline-dot.active .timeline-tooltip {
    opacity: 1;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="overlay">
  <a id="title-link" href="#" target="_blank" rel="noopener">
    <h1 id="title"></h1>
    <p id="subtitle"></p>
  </a>
</div>

<div id="timeline" class="hidden">
  <div id="timeline-track">
    <div id="timeline-line"></div>
  </div>
</div>

<nav id="controls">
  <button data-mode="generate" class="active">Generate</button>
  <button data-mode="library">Library</button>
</nav>

<script type="module" src="js/main.js"></script>
</body>
</html>
