<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Composition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0C0C0C;
    font-family: 'Karla', sans-serif;
    color: #E8E2D8;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Vignette — radial darkening at edges */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    background: radial-gradient(
      ellipse 70% 65% at 50% 50%,
      transparent 0%,
      rgba(0, 0, 0, 0.25) 80%,
      rgba(0, 0, 0, 0.55) 100%
    );
  }

  /* Projected light zone behind the canvas */
  body::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    /* Sized by JS on the canvas, but fallback: */
    width: calc(var(--canvas-w, 480px) + 20px);
    height: calc(var(--canvas-h, 480px) + 20px);
    z-index: 0;
    pointer-events: none;
    background: rgba(255, 255, 255, 0.025);
    border-radius: 1px;
  }

  /* Canvas — projected onto the wall */
  #canvas {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    /* Soft diffused glow — ambient light spill, not a border */
    box-shadow:
      0 0 40px 10px rgba(255, 248, 235, 0.04),
      0 0 100px 40px rgba(255, 245, 225, 0.025),
      0 0 220px 80px rgba(255, 240, 215, 0.015);
    transition: box-shadow 1.2s ease;
  }

  /* Overlay: title and subtitle */
  #overlay {
    position: absolute;
    bottom: 80px;
    left: 0;
    right: 0;
    z-index: 10;
    text-align: center;
    padding: 0 24px;
    transition: opacity 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  #title-link {
    text-decoration: none;
    color: inherit;
    display: inline-block;
    transition: opacity 0.4s ease;
  }

  #title-link:hover {
    opacity: 0.7;
  }

  #title {
    font-family: 'Libre Baskerville', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 17px;
    color: #E8E2D8;
    letter-spacing: 0.01em;
    margin-bottom: 5px;
    transition: color 0.4s ease;
  }

  #subtitle {
    font-family: 'Karla', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.04em;
    color: #8A8078;
    transition: color 0.4s ease;
  }

  /* Controls — bottom-left, barely visible text */
  #controls {
    position: fixed;
    bottom: 24px;
    left: 28px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 0;
    opacity: 0.15;
    transition: opacity 0.5s ease;
  }

  #controls:hover {
    opacity: 0.6;
  }

  #controls button {
    font-family: 'Karla', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.03em;
    padding: 4px 0;
    border: none;
    background: transparent;
    color: #8A8078;
    cursor: pointer;
    transition: color 0.3s ease;
    position: relative;
    white-space: nowrap;
  }

  #controls button:hover {
    color: #C8C0B4;
  }

  #controls button.active {
    color: #D4CCC2;
  }

  #controls button.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: #8A8078;
  }

  /* Divider between controls */
  #controls button + button::before {
    content: '\00B7';
    position: relative;
    display: inline-block;
    margin: 0 10px 0 10px;
    color: #5A5450;
    pointer-events: none;
    font-size: 14px;
    line-height: 1;
    vertical-align: middle;
  }

  /* Timeline — ultra-thin bottom strip, felt not seen */
  #timeline {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 50;
    height: 28px;
    padding: 0;
    transition: opacity 0.6s cubic-bezier(0.25, 0.1, 0.25, 1),
                visibility 0.6s;
    opacity: 1;
    visibility: visible;
  }

  #timeline.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  #timeline-track {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 5%;
  }

  /* Hide the line entirely */
  #timeline-line {
    position: absolute;
    top: 50%;
    left: 5%;
    right: 5%;
    height: 1px;
    background: rgba(255, 255, 255, 0.03);
    transform: translateY(-50%);
  }

  /* Dots — tiny, almost invisible specks */
  .timeline-dot {
    position: absolute;
    top: 50%;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    transform: translate(-50%, -50%);
    cursor: pointer;
    transition: background 0.3s ease,
                box-shadow 0.3s ease,
                width 0.3s ease,
                height 0.3s ease;
    z-index: 2;
  }

  .timeline-dot:hover {
    width: 5px;
    height: 5px;
    background: rgba(232, 226, 216, 0.45);
    box-shadow: 0 0 6px 2px rgba(232, 226, 216, 0.12);
  }

  .timeline-dot.active {
    width: 4px;
    height: 4px;
    background: rgba(232, 226, 216, 0.5);
    box-shadow: 0 0 4px 1px rgba(232, 226, 216, 0.1);
  }

  /* Year labels — hidden by default, visible on hover */
  .timeline-year {
    position: absolute;
    top: calc(50% - 18px);
    transform: translateX(-50%);
    font-family: 'Karla', sans-serif;
    font-weight: 300;
    font-size: 9px;
    letter-spacing: 0.06em;
    color: rgba(138, 128, 120, 0);
    white-space: nowrap;
    pointer-events: none;
    transition: color 0.3s ease;
  }

  #timeline:hover .timeline-year {
    color: rgba(138, 128, 120, 0.35);
  }

  /* Tooltip */
  .timeline-tooltip {
    position: absolute;
    bottom: calc(50% + 14px);
    left: 50%;
    transform: translateX(-50%);
    padding: 5px 10px;
    border-radius: 4px;
    background: rgba(12, 12, 12, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.04);
    font-family: 'Karla', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.02em;
    color: rgba(232, 226, 216, 0.7);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: 10;
  }

  .timeline-dot:hover .timeline-tooltip {
    opacity: 1;
  }

  /* Selection */
  ::selection {
    background: rgba(232, 226, 216, 0.15);
    color: #E8E2D8;
  }

  ::-webkit-scrollbar {
    display: none;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="overlay">
  <a id="title-link" href="#" target="_blank" rel="noopener">
    <h1 id="title"></h1>
    <p id="subtitle"></p>
  </a>
</div>

<div id="timeline" class="hidden">
  <div id="timeline-track">
    <div id="timeline-line"></div>
  </div>
</div>

<nav id="controls">
  <button data-mode="generate" class="active">Generate</button>
  <button data-mode="library">Library</button>
</nav>

<script type="module" src="js/main.js"></script>
</body>
</html>
