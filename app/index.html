<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Composition</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <a id="title-link" href="#" target="_blank" rel="noopener">
      <h1 id="title"></h1>
      <p id="subtitle"></p>
    </a>
  </div>
  <div id="timeline" class="hidden">
    <div id="timeline-track">
      <div id="timeline-line"></div>
    </div>
  </div>
  <nav id="controls">
    <button data-mode="generate" class="active">Generate</button>
    <button data-mode="library">Library</button>
  </nav>
  <script type="module" src="js/main.js"></script>
</body>
</html>
