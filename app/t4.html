<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Composition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #F2EDE4;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ---- Running header — book-style folio ---- */
    .running-header {
      position: fixed;
      top: 28px;
      left: 36px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8C857A;
      z-index: 10;
      user-select: none;
    }

    .running-header::after {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: #C4BDB2;
      margin-top: 8px;
    }

    /* ---- Main spread layout ---- */
    .spread {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 100%;
      max-width: 1200px;
      padding: 60px 48px 100px;
    }

    /* ---- Canvas (the plate) ---- */
    .canvas-frame {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 62%;
      padding-right: 48px;
    }

    #canvas {
      display: block;
      border: 1px solid #D6D0C6;
    }

    /* ---- Overlay — catalogue metadata sidebar ---- */
    #overlay {
      flex: 0 0 auto;
      width: 30%;
      min-width: 200px;
      max-width: 320px;
      padding-left: 48px;
      border-left: 1px solid #D6D0C6;
      transition: opacity 0.5s ease;
    }

    .plate-label {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #C41E3A;
      margin-bottom: 16px;
    }

    #title-link {
      text-decoration: none;
      display: block;
    }

    #title-link:hover #title {
      color: #000;
    }

    #title {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-weight: 400;
      font-size: 28px;
      letter-spacing: 0.01em;
      color: #1a1a1a;
      line-height: 1.3;
      transition: color 0.3s ease;
    }

    .metadata-rule {
      width: 32px;
      height: 1px;
      background: #D6D0C6;
      margin: 16px 0;
    }

    #subtitle {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 14px;
      color: #8C857A;
      line-height: 1.6;
      letter-spacing: 0.01em;
    }

    #subtitle a,
    #title-link:hover #subtitle {
      color: #C41E3A;
    }

    /* ---- Timeline T4: Left-side vertical — book marginalia ---- */
    #timeline {
      position: fixed;
      left: 36px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 55vh;
      transition: opacity 0.4s ease;
    }

    #timeline.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #timeline-track {
      position: relative;
      width: 55vh;
      height: 20px;
      transform: rotate(90deg);
      transform-origin: 0 0;
      left: 20px;
    }

    #timeline-line {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 0.5px;
      background: rgba(196, 189, 178, 0.4);
      transform: translateY(-50%);
    }

    .timeline-dot {
      position: absolute;
      top: 50%;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #C4BDB2;
      transform: translate(-50%, -50%);
      cursor: pointer;
      transition: all 0.25s ease;
      z-index: 1;
      border: none;
      padding: 0;
    }

    .timeline-dot::before {
      content: '';
      position: absolute;
      top: -8px;
      left: -8px;
      right: -8px;
      bottom: -8px;
    }

    .timeline-dot:hover {
      background: #8C857A;
      transform: translate(-50%, -50%) scale(1.8);
    }

    .timeline-dot.active {
      background: #C41E3A;
      transform: translate(-50%, -50%) scale(1.5);
    }

    .timeline-year {
      position: absolute;
      top: calc(50% + 12px);
      transform: translateX(-50%) rotate(-90deg);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 8px;
      color: #B8B0A6;
      letter-spacing: 0.04em;
      white-space: nowrap;
      pointer-events: none;
    }

    .timeline-tooltip {
      position: absolute;
      bottom: calc(50% + 10px);
      left: 50%;
      transform: translateX(-50%) rotate(-90deg);
      transform-origin: center bottom;
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 10px;
      color: #3E3830;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .timeline-dot:hover .timeline-tooltip {
      opacity: 1;
    }

    /* ---- Controls ---- */
    #controls {
      position: fixed;
      top: 28px;
      right: 36px;
      display: flex;
      gap: 24px;
      z-index: 10;
    }

    #controls button {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #A9A299;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      position: relative;
      transition: color 0.3s ease;
    }

    #controls button::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 1.5px;
      background: #C41E3A;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    #controls button:hover {
      color: #5C564E;
    }

    #controls button.active {
      color: #C41E3A;
    }

    #controls button.active::after {
      transform: scaleX(1);
    }

    /* ---- Responsive: mobile/narrow — vertical stack ---- */
    @media (max-width: 860px) {
      body {
        justify-content: flex-start;
        align-items: center;
      }

      .spread {
        flex-direction: column;
        align-items: center;
        padding: 72px 24px 110px;
        gap: 0;
      }

      .canvas-frame {
        width: 100%;
        padding-right: 0;
        justify-content: center;
      }

      #overlay {
        width: 100%;
        max-width: 480px;
        min-width: unset;
        padding-left: 0;
        padding-top: 20px;
        margin-top: 20px;
        border-left: none;
        border-top: 1px solid #D6D0C6;
        text-align: center;
      }

      .plate-label {
        margin-bottom: 10px;
      }

      .metadata-rule {
        margin: 12px auto;
      }

      #title {
        font-size: 22px;
      }

      #subtitle {
        font-size: 13px;
      }

      .running-header {
        top: 20px;
        left: 24px;
        font-size: 9px;
      }

      #controls {
        top: 20px;
        right: 24px;
        gap: 18px;
      }

      #controls button {
        font-size: 9px;
      }

      #timeline {
        width: 90%;
        bottom: 44px;
      }
    }

    @media (max-width: 480px) {
      .spread {
        padding: 64px 16px 100px;
      }

      .running-header {
        top: 16px;
        left: 16px;
      }

      #controls {
        top: 16px;
        right: 16px;
        gap: 14px;
      }

      #title {
        font-size: 20px;
      }

      #timeline {
        width: 92%;
        bottom: 38px;
      }
    }
  </style>
</head>
<body>

  <div class="running-header">Living Composition</div>

  <div class="spread">
    <div class="canvas-frame">
      <canvas id="canvas"></canvas>
    </div>

    <div id="overlay">
      <div class="plate-label">Plate</div>
      <a id="title-link" href="#" target="_blank" rel="noopener">
        <h1 id="title"></h1>
        <div class="metadata-rule"></div>
        <p id="subtitle"></p>
      </a>
    </div>
  </div>

  <div id="timeline" class="hidden">
    <div id="timeline-track">
      <div id="timeline-line"></div>
    </div>
  </div>

  <nav id="controls">
    <button data-mode="generate" class="active">Generate</button>
    <button data-mode="library">Library</button>
  </nav>

  <script type="module" src="js/main.js"></script>
</body>
</html>
